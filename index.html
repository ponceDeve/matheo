<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cumpleaños de Matteo Daniel</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #87CEEB 0%, #b8e8ff 40%, #d4f5c4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Nubes */
    .cloud {
      position: fixed;
      left: 0;
      background: white;
      border-radius: 50px;
      opacity: 0.85;
      animation: cloudMove var(--dur) linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud::before {
      width: 60%;
      height: 160%;
      top: -60%;
      left: 15%;
    }

    .cloud::after {
      width: 45%;
      height: 140%;
      top: -50%;
      right: 15%;
    }

    @keyframes cloudMove {
      from {
        transform: translateX(-300px);
      }

      to {
        transform: translateX(110vw);
      }
    }

    /* Estrellitas/destellos */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      animation: sparklePop var(--d) ease-in-out infinite;
      font-size: var(--s);
    }

    @keyframes sparklePop {

      0%,
      100% {
        transform: scale(0.5) rotate(0deg);
        opacity: 0.3;
      }

      50% {
        transform: scale(1.2) rotate(20deg);
        opacity: 1;
      }
    }

    /* Globos */
    .balloon {
      position: fixed;
      bottom: -150px;
      animation: floatUp var(--dur) ease-in infinite var(--delay);
      z-index: 1;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .balloon-body {
      width: 46px;
      height: 56px;
      border-radius: 50% 50% 48% 48% / 60% 60% 40% 40%;
      background: var(--color);
      position: relative;
      animation: sway var(--sw) ease-in-out infinite alternate;
      box-shadow: inset -8px -8px 16px rgba(0, 0, 0, 0.15), inset 5px 5px 10px rgba(255, 255, 255, 0.4);
    }

    .balloon-body::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      width: 11px;
      height: 15px;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    .balloon-body::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: var(--color);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
    }

    .balloon-string {
      width: 1.5px;
      height: 34px;
      background: rgba(0, 0, 0, 0.2);
    }

    @keyframes sway {
      from {
        transform: rotate(-10deg);
      }

      to {
        transform: rotate(10deg);
      }
    }

    @keyframes floatUp {
      0% {
        bottom: -150px;
        opacity: 1;
      }

      85% {
        opacity: 1;
      }

      100% {
        bottom: 110vh;
        opacity: 0;
      }
    }

    /* Card */
    .card {
      background: white;
      border-radius: 36px;
      max-width: 400px;
      width: 100%;
      padding: 40px 28px 36px;
      text-align: center;
      position: relative;
      z-index: 10;
      border: 4px solid #FFD700;
      box-shadow:
        0 0 0 8px rgba(255, 215, 0, 0.15),
        0 16px 50px rgba(0, 0, 0, 0.12);
      animation: cardPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* Zigzag superior */
    .card::before {
      content: '';
      position: absolute;
      top: -14px;
      left: 20px;
      right: 20px;
      height: 14px;
      background:
        linear-gradient(135deg, #FF6B6B 25%, transparent 25%) -10px 0,
        linear-gradient(225deg, #FF6B6B 25%, transparent 25%) -10px 0,
        linear-gradient(315deg, #FF6B6B 25%, transparent 25%),
        linear-gradient(45deg, #FF6B6B 25%, transparent 25%);
      background-size: 20px 14px;
      background-color: transparent;
    }

    @keyframes cardPop {
      from {
        transform: scale(0.6);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Nombre */
    .name {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 58px;
      color: #FF6B6B;
      line-height: 1.0;
      margin-bottom: 4px;
      animation: bounce 2s ease-in-out infinite;
      text-shadow: 4px 4px 0 #FFD700;
    }

    .name span {
      display: block;
      font-size: 42px;
      color: #4ECDC4;
      text-shadow: 4px 4px 0 #45B7AA;
      animation: bounce 2s ease-in-out infinite;
      animation-delay: 0.15s;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    /* Foto */
    .photo-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 22px auto 24px;
    }

    .photo-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(#FF6B6B, #FFD700, #4ECDC4, #A8E6CF, #FF6B6B);
      animation: spin 4s linear infinite;
    }

    .photo-ring-inner {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: white;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .photo {
      position: absolute;
      inset: 6px;
      width: calc(100% - 12px);
      height: calc(100% - 12px);
      border-radius: 50%;
      object-fit: cover;
      z-index: 2;
    }

    .crown {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      z-index: 3;
      animation: crownBounce 1.5s ease-in-out infinite;
      filter: drop-shadow(0 2px 6px rgba(255, 215, 0, 0.6));
    }

    @keyframes crownBounce {

      0%,
      100% {
        transform: translateX(-50%) rotate(-6deg);
      }

      50% {
        transform: translateX(-50%) rotate(6deg) translateY(-5px);
      }
    }

    /* Detalles */
    .details {
      background: linear-gradient(135deg, #FFF9C4, #E0F7FA);
      border-radius: 18px;
      padding: 18px 20px;
      border: 2px dashed #FFD700;
      margin-bottom: 22px;
      text-align: left;
    }

    .detail-row {
      display: flex;
      gap: 10px;
      padding: 9px 0;
      font-size: 15px;
      color: #444;
      border-bottom: 1.5px dashed #FFE082;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 700;
      color: #FF6B6B;
      min-width: 56px;
      font-size: 14px;
    }

    /* Botón */
    .btn-confirm {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 15px 0;
      font-size: 18px;
      font-family: 'Bubblegum Sans', cursive;
      cursor: pointer;
      width: 100%;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4), 0 3px 0 #cc4444;
    }

    .btn-confirm::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      transform: skewX(-20deg);
      animation: shine 2.5s ease-in-out infinite;
    }

    @keyframes shine {
      0% {
        left: -100%;
      }

      50% {
        left: 150%;
      }

      100% {
        left: 150%;
      }
    }

    .btn-confirm:hover {
      transform: scale(1.04);
    }

    .btn-confirm:active {
      transform: scale(0.97);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: white;
      border-radius: 28px;
      padding: 36px 28px 32px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      position: relative;
      border: 3px solid #FFD700;
      box-shadow: 0 0 0 6px rgba(255, 215, 0, 0.15), 0 20px 50px rgba(0, 0, 0, 0.2);
      transform: scale(0.7) translateY(40px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      opacity: 0;
    }

    .modal-overlay.visible .modal {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #ccc;
      transition: color 0.2s, transform 0.2s;
    }

    .modal-close:hover {
      color: #FF6B6B;
      transform: rotate(90deg);
    }

    .modal-emoji {
      font-size: 52px;
      display: block;
      margin-bottom: 10px;
      animation: wiggle 1.2s ease-in-out infinite;
    }

    @keyframes wiggle {

      0%,
      100% {
        transform: rotate(-10deg);
      }

      50% {
        transform: rotate(10deg);
      }
    }

    .modal h2 {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 24px;
      color: #FF6B6B;
      margin-bottom: 6px;
      text-shadow: 2px 2px 0 #FFD700;
    }

    .modal p {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .modal label {
      display: block;
      text-align: left;
      font-size: 13px;
      font-weight: 700;
      color: #4ECDC4;
      margin-bottom: 6px;
    }

    .modal input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #FFE082;
      border-radius: 14px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      outline: none;
      color: #333;
      background: #FFFDE7;
      margin-bottom: 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .modal input:focus {
      border-color: #FF6B6B;
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
    }

    .btn-enviar {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 0;
      font-size: 17px;
      font-family: 'Bubblegum Sans', cursive;
      cursor: pointer;
      width: 100%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3);
      transition: transform 0.15s;
    }

    .btn-enviar::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transform: skewX(-20deg);
      animation: shine 2.5s ease-in-out infinite;
    }

    .btn-enviar:hover {
      transform: scale(1.04);
    }

    .btn-enviar:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="name">
      Matteo
      <span>Daniel</span>
    </div>

    <div class="photo-wrap">
      <div class="photo-ring"></div>
      <div class="photo-ring-inner"></div>
      <div class="crown">👑</div>
      <img class="photo" src="https://i.postimg.cc/QtdMpdT3/Chat-GPT-Image-28-jun-2026-08-40-10-a-m.png"
        alt="Matteo Daniel">
    </div>

    <div class="details">
      <div class="detail-row">
        <span class="detail-label">Fecha</span>
        <span>18 de julio, 2026</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Hora</span>
        <span>4:00 p.m.</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Lugar</span>
        <span>Mz. I Lt. 2, Chavinillo</span>
      </div>
    </div>

    <button class="btn-confirm" onclick="abrirModal()">Confirmar asistencia</button>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="cerrarModalFuera(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="cerrarModal()">✕</button>
      <span class="modal-emoji">🎂</span>
      <h2>Vas a la fiesta?</h2>
      <p>Escribe tu nombre y confirma tu asistencia</p>
      <label>Tu nombre</label>
      <input type="text" id="nombreInput" placeholder="Escribe tu nombre...">
      <button class="btn-enviar" onclick="enviarWhatsapp()">Enviar</button>
    </div>
  </div>

  <script>
    const balloonColors = ['#FF6B6B', '#FFD700', '#4ECDC4', '#A8E6CF', '#FF8E53', '#74B9FF'];

    // Nubes
    for (let i = 0; i < 14; i++) {
      const c = document.createElement('div');
      c.className = 'cloud';
      const w = Math.floor(Math.random() * 120 + 80);
      const h = Math.floor(w * 0.35);
      const top = Math.random() * 45;
      const dur = Math.random() * 18 + 14;
      c.style.cssText = `width:${w}px;height:${h}px;top:${top}%;--dur:${dur.toFixed(1)}s;animation-delay:-${(Math.random() * dur).toFixed(1)}s;`;
      document.body.appendChild(c);
    }

    // Destellos
    const sparkles = ['⭐', '✨', '🌟'];
    for (let i = 0; i < 12; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
      s.style.cssText = `top:${Math.random() * 90}%;left:${Math.random() * 100}%;--d:${(Math.random() * 2 + 1.5).toFixed(1)}s;--s:${Math.floor(Math.random() * 14 + 10)}px;animation-delay:${(Math.random() * 3).toFixed(1)}s;`;
      document.body.appendChild(s);
    }

    // Globos
    for (let i = 0; i < 22; i++) {
      const b = document.createElement('div');
      b.className = 'balloon';
      const body = document.createElement('div');
      body.className = 'balloon-body';
      body.style.setProperty('--color', balloonColors[i % balloonColors.length]);
      body.style.setProperty('--sw', `${(Math.random() * 1.5 + 2).toFixed(1)}s`);
      const str = document.createElement('div');
      str.className = 'balloon-string';
      b.appendChild(body);
      b.appendChild(str);
      b.style.cssText = `left:${Math.random() * 95}%;--dur:${(Math.random() * 3 + 5).toFixed(1)}s;--delay:${(Math.random() * 5).toFixed(1)}s;`;
      document.body.appendChild(b);
    }

    function abrirModal() {
      document.getElementById('modalOverlay').classList.add('visible');
      setTimeout(() => document.getElementById('nombreInput').focus(), 400);
    }

    function cerrarModal() {
      document.getElementById('modalOverlay').classList.remove('visible');
    }

    function cerrarModalFuera(e) {
      if (e.target === document.getElementById('modalOverlay')) cerrarModal();
    }

    function enviarWhatsapp() {
      const nombre = document.getElementById('nombreInput').value.trim();
      if (!nombre) {
        const input = document.getElementById('nombreInput');
        input.style.borderColor = '#FF6B6B';
        input.placeholder = 'Pon tu nombre primero!';
        input.focus();
        return;
      }
      const mensaje = `Hola! Soy ${nombre} y voy a asistir al cumpleaños de Matteo Daniel`;
      window.open(`https://wa.me/51960744792?text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });
  </script>
</body>

</html>
